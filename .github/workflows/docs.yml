# 构建 guide/ mdbook 并部署到 GitHub Pages（项目站点：https://www159-used.github.io/logkit/）。
# 仓库 Settings → Pages → Build and deployment → Source: GitHub Actions。
# 仅 master 推送时发布文档。

name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ts-graphviz/setup-graphviz@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-mdbook

      - name: Install mdbook toolchain
        run: |
          cargo install mdbook --version 0.5.3 --locked
          cargo install mdbook-modern-dot --version 0.0.7 --locked

      - name: mdbook build
        run: mdbook build guide

      - uses: actions/upload-pages-artifact@v3
        with:
          path: guide/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
