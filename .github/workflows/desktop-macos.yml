# Logkit Desktop（Tauri）macOS 编译冒烟：leptos 前端 + desktop crate，不打 dmg 包。
# dev / master 日常开发；PR 目标为 dev 或 master 时也会触发。

name: Desktop (macOS)

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  tauri-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python deps (icon script)
        run: pip install pillow

      - uses: Swatinem/rust-cache@v2

      - name: Cache leptos / tauri CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-leptos
            ~/.cargo/bin/cargo-tauri
          key: cli-tools-${{ runner.os }}-leptos-0.3.7-tauri-2.11.4

      - name: Install leptos / tauri CLI
        run: |
          set -euo pipefail
          if ! command -v cargo-leptos >/dev/null; then
            cargo install cargo-leptos --locked --version 0.3.7
          fi
          if ! command -v cargo-tauri >/dev/null; then
            cargo install tauri-cli --locked --version 2.11.4
          fi

      - name: cargo tauri build
        working-directory: apps/logkit-desktop/src-tauri
        run: cargo tauri build --no-bundle
