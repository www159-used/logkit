name: Release builds

# Linux：x86_64 / aarch64 glibc 2.17（Zig 链老 glibc，pullout 可 dlopen）。macOS：Apple Silicon。
# 推送 v* 标签时合并产物并创建 GitHub Release（含源码 git archive）。

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build and package (glibc 2.17)
        run: |
          set -euo pipefail
          for target in x86_64-unknown-linux-gnu.2.17 aarch64-unknown-linux-gnu.2.17; do
            cargo zigbuild --release --target "$target"
            release_dir="$GITHUB_WORKSPACE/target/$target/release"
            if [[ ! -f "$release_dir/logen" ]]; then
              base="${target%.2.*}"
              release_dir="$GITHUB_WORKSPACE/target/$base/release"
            fi
            parent="$GITHUB_WORKSPACE/dist/.stage-$target"
            stage="$parent/logkit"
            rm -rf "$parent"
            mkdir -p "$stage/bin" "$stage/etc" "$stage/tools/bin"
            cp "$release_dir/logen" "$release_dir/logend" "$stage/bin/"
            for tool in parse_client_conf mysql_local pullout jumpserver; do
              if [[ -f "$release_dir/$tool" ]]; then
                cp "$release_dir/$tool" "$stage/tools/bin/"
                chmod +x "$stage/tools/bin/$tool"
              else
                echo "warning: $tool missing for $target" >&2
              fi
            done
            cp "$GITHUB_WORKSPACE/etc/"* "$stage/etc/"
            cp "$GITHUB_WORKSPACE/bin/install.sh" "$stage/install.sh"
            chmod +x "$stage/install.sh" \
              "$stage/bin/logen" "$stage/bin/logend"
            mkdir -p "$GITHUB_WORKSPACE/dist"
            tar -czf "$GITHUB_WORKSPACE/dist/logkit-${target}.tar.gz" \
              -C "$parent" --owner=0 --group=0 --numeric-owner logkit
            rm -rf "$parent"
          done

      - name: Source archive (git archive)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          git archive --format=tar.gz -o "dist/logkit-${{ github.ref_name }}-src.tar.gz" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: dist/*.tar.gz

  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      - name: Build and package
        run: |
          set -euo pipefail
          target=aarch64-apple-darwin
          cargo build --release --target "$target"
          parent="$GITHUB_WORKSPACE/dist/.stage-$target"
          stage="$parent/logkit"
          rm -rf "$parent"
          mkdir -p "$stage/bin" "$stage/etc" "$stage/tools/bin"
          cp "$GITHUB_WORKSPACE/target/$target/release/logen" \
             "$GITHUB_WORKSPACE/target/$target/release/logend" \
             "$stage/bin/"
          for tool in parse_client_conf mysql_local pullout; do
            if [[ -f "$GITHUB_WORKSPACE/target/$target/release/$tool" ]]; then
              cp "$GITHUB_WORKSPACE/target/$target/release/$tool" "$stage/tools/bin/"
              chmod +x "$stage/tools/bin/$tool"
            else
              echo "warning: $tool missing for $target" >&2
            fi
          done
          cp "$GITHUB_WORKSPACE/etc/"* "$stage/etc/"
          cp "$GITHUB_WORKSPACE/bin/install.sh" "$stage/install.sh"
          chmod +x "$stage/install.sh" \
            "$stage/bin/logen" "$stage/bin/logend"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          COPYFILE_DISABLE=1 tar -czf "$GITHUB_WORKSPACE/dist/logkit-${target}.tar.gz" -C "$parent" logkit
          rm -rf "$parent"

      - uses: actions/upload-artifact@v4
        with:
          name: logkit-dist-macos-arm
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-gnu, macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          name: logkit-dist-macos-arm
          path: release-assets

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
