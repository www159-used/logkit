name: Release builds

# Linux：x86_64 / aarch64 glibc（GCC 动态链，pullout 可 dlopen）。macOS：Apple Silicon。
# 推送 v* 标签时合并产物并创建 GitHub Release（含源码 git archive）。

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GCC cross toolchain (aarch64)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build and package
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            cargo build --release --target "$target"
            parent="$GITHUB_WORKSPACE/dist/.stage-$target"
            stage="$parent/logkit"
            rm -rf "$parent"
            mkdir -p "$stage/bin" "$stage/etc" "$stage/tools/bin"
            cp "$GITHUB_WORKSPACE/target/$target/release/logen" \
               "$GITHUB_WORKSPACE/target/$target/release/logend" \
               "$stage/bin/"
            for tool in parse_client_conf mysql_local pullout; do
              if [[ -f "$GITHUB_WORKSPACE/target/$target/release/$tool" ]]; then
                cp "$GITHUB_WORKSPACE/target/$target/release/$tool" "$stage/tools/bin/"
                chmod +x "$stage/tools/bin/$tool"
              else
                echo "warning: $tool missing for $target" >&2
              fi
            done
            cp "$GITHUB_WORKSPACE/etc/"* "$stage/etc/"
            cp "$GITHUB_WORKSPACE/bin/install.sh" "$stage/install.sh"
            chmod +x "$stage/install.sh" \
              "$stage/bin/logen" "$stage/bin/logend"
            mkdir -p "$GITHUB_WORKSPACE/dist"
            tar -czf "$GITHUB_WORKSPACE/dist/logkit-${target}.tar.gz" \
              -C "$parent" --owner=0 --group=0 --numeric-owner logkit
            rm -rf "$parent"
          done

      - name: Source archive (git archive)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          git archive --format=tar.gz -o "dist/logkit-${{ github.ref_name }}-src.tar.gz" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: dist/*.tar.gz

  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      - name: Build and package
        run: |
          set -euo pipefail
          target=aarch64-apple-darwin
          cargo build --release --target "$target"
          parent="$GITHUB_WORKSPACE/dist/.stage-$target"
          stage="$parent/logkit"
          rm -rf "$parent"
          mkdir -p "$stage/bin" "$stage/etc" "$stage/tools/bin"
          cp "$GITHUB_WORKSPACE/target/$target/release/logen" \
             "$GITHUB_WORKSPACE/target/$target/release/logend" \
             "$stage/bin/"
          for tool in parse_client_conf mysql_local pullout; do
            if [[ -f "$GITHUB_WORKSPACE/target/$target/release/$tool" ]]; then
              cp "$GITHUB_WORKSPACE/target/$target/release/$tool" "$stage/tools/bin/"
              chmod +x "$stage/tools/bin/$tool"
            else
              echo "warning: $tool missing for $target" >&2
            fi
          done
          cp "$GITHUB_WORKSPACE/etc/"* "$stage/etc/"
          cp "$GITHUB_WORKSPACE/bin/install.sh" "$stage/install.sh"
          chmod +x "$stage/install.sh" \
            "$stage/bin/logen" "$stage/bin/logend"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          COPYFILE_DISABLE=1 tar -czf "$GITHUB_WORKSPACE/dist/logkit-${target}.tar.gz" -C "$parent" logkit
          rm -rf "$parent"

      - uses: actions/upload-artifact@v4
        with:
          name: logkit-dist-macos-arm
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-gnu, macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: release-assets

      - uses: actions/download-artifact@v4
        with:
          name: logkit-dist-macos-arm
          path: release-assets

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
