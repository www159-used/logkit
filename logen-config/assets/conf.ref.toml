# Reference defaults (embedded). Override with --defaults-file merged on top.

[client]
transport = "unix"
# transport = "tcp"
# host = "127.0.0.1"
# port = 19407
# socket = "/tmp/logend/logend.sock"

[logend]
# 单实例根目录（sock / pid / logend.log 默认在其下）；多实例须不同 tmp_dir
tmp_dir = "/tmp/logend"
pid_record_suffix = "\n"
log_level = "info"
# socket = "/var/run/logkit/logend.sock"
# listen = "127.0.0.1:19407"
worker_output_dir = "./output"
heartbeat_timeout_secs = 30
heartbeat_interval_secs = 1
# runtime_threads = 4
max_decoding_message_size_bytes = 4194304
max_encoding_message_size_bytes = 4194304
ping_reply_text = "PONG"
