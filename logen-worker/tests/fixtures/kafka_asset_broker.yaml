# 集成测试用 Kafka TLS fixture；用 `cargo test -p logen-worker --test kafka_probe` 等运行。
# 首次写出前会等待一个 min-interval；按 Ctrl+C 结束。topic 须已存在或集群允许自动创建。
#
# 若只需验证 TLS 与 metadata、不写 topic，请用集成测试（本文件即其 Kafka 配置来源）：
#   cargo test -p logen-worker --test kafka_probe kafka_probe_metadata_and_optional_produce -- --ignored --nocapture

body:
  template: "logen tls smoke line"
  fields: {}

min-interval: 60s

sink:
  type: kafka
  kafka:
    brokers:
      - "192.168.1.60:9092"
    topic: logen-ssl-smoke
    security.protocol: SSL
    ssl.truststore.location: ../assets/truststore.jks
    ssl.truststore.password: "vKFoWrbf_El1pCtcUVHZn0ygI5Mu8izQ"
    ssl.keystore.location: ../assets/keystore.jks
    ssl.keystore.password: "8c4804e1504aa139bd827c9c016f11d4cc7174a95352f5068a3cb2c1f4849e91"
    ssl.endpoint.identification.algorithm: ""
