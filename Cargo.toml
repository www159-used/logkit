# logkit — 根工作区：logen（CLI）、logend、logen-dsl、logen-config、logen-proto。
[workspace]
resolver = "2"
members = [
    "java-ssl-pem",
    "logen-config",
    "logen-proto",
    "logen",
    "logend",
    "logen-dsl",
    "logen-worker",
    "tools/resolve_oem",
    "tools/parse_client_conf",
    "tools/mysql_local",
]

[workspace.package]
version = "1.5.0"
edition = "2021"
license = "GPL-3.0"

[workspace.dependencies]
clap = { version = "4", features = ["derive", "env"] }
async-trait = "0.1"
bytes = "1"

http = "1"
hyper-util = { version = "0.1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", default-features = false }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.14"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
tower = "0.5"
prost = "0.14"
rust-embed = { version = "8", features = ["include-exclude"] }
uuid = { version = "1", default-features = false, features = ["v4"] }
