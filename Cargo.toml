# logkit — 根工作区：logspout（CLI）、logspout-daemon、logspout-dsl、logspout-config、logspout-proto。
[workspace]
resolver = "2"
members = [
    "java-ssl-pem",
    "logspout-config",
    "logspout-proto",
    "logspout",
    "logspout-daemon",
    "logspout-dsl",
    "logspout-worker",
    "tools/resolve_oem",
    "tools/parse_client_conf",
]

[workspace.dependencies]
clap = { version = "4", features = ["derive", "env"] }
async-trait = "0.1"
# kafka-protocol 0.10 与 bytes≥1.10 的 Buf::try_get_* 歧义（E0034）；暂锁全工作区 bytes 1.9。
bytes = "=1.9.0"

http = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
# 仅统一版本；各 crate 用 `tokio = { workspace = true, features = [...] }` 声明自身需要的 feature。
tokio = { version = "1", default-features = false }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.12"
tonic-build = "0.12"
tower = "0.5"
prost = "0.13"
rust-embed = { version = "8", features = ["include-exclude"] }
uuid = { version = "1", default-features = false, features = ["v4"] }
