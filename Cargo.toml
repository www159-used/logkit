# logkit — 根工作区：logspout（CLI）、logspout-daemon、logspout-dsl、logspout-config、logspout-proto。
[workspace]
resolver = "2"
members = [
    "java-ssl-pem",
    "logspout-config",
    "logspout-proto",
    "logspout",
    "logspout-daemon",
    "logspout-dsl",
    "logspout-worker",
    "tools/resolve_oem",
    "tools/parse_client_conf",
]

[workspace.dependencies]
clap = { version = "4", features = ["derive", "env"] }
async-trait = "0.1"
bytes = "1"

http = "1"
hyper-util = { version = "0.1", features = ["tokio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", default-features = false }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.14"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
tower = "0.5"
prost = "0.14"
rust-embed = { version = "8", features = ["include-exclude"] }
uuid = { version = "1", default-features = false, features = ["v4"] }
