syntax = "proto3";

package logen.v1;

// Control plane on Unix socket (gRPC over UDS). Log generation runs via embedded logen-worker tasks.
service Logen {
  rpc Ping(PingRequest) returns (PingReply);
  rpc Echo(EchoRequest) returns (EchoReply);
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersReply);
  rpc RunControlScript(RunControlScriptRequest) returns (RunControlScriptReply);
  rpc OpenControlSession(OpenControlSessionRequest) returns (OpenControlSessionReply);
  rpc EvalControlSession(EvalControlSessionRequest) returns (RunControlScriptReply);
  rpc CloseControlSession(CloseControlSessionRequest) returns (CloseControlSessionReply);
  rpc StopWorker(StopWorkerRequest) returns (StopWorkerReply);
  rpc CatWorker(CatWorkerRequest) returns (CatWorkerReply);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatReply);
  // id_prefix 为空则返回全部；否则 id 前缀匹配（可匹配多条）
  rpc StatWorker(StatWorkerRequest) returns (StatWorkerReply);
}

message PingRequest {}

message PingReply {
  string pong = 1;
}

message EchoRequest {
  string message = 1;
}

message EchoReply {
  string message = 1;
}

message ListWorkersRequest {}

message WorkerEntry {
  string id = 1;
  // 展示标签（控制脚本中 start 的 label 或来源标签，非托管文件路径）
  string config_path = 2;
  bool alive = 3;
  bool healthy = 4;
  // 自控制脚本 start 装配的 sink 摘要
  string sink_summary = 5;
}

message ListWorkersReply {
  repeated WorkerEntry workers = 1;
}

message RunControlScriptRequest {
  // 控制脚本全文（.logen）；由 logend 解释，必须显式调用 start(logen(...))。
  string script = 1;
  // 展示用来源标签，常为 `logen start` 传入的本地脚本路径。
  string config_label = 2;
  // 覆盖 TOML `[client].auto-kafka-protocol`；省略时由 logend 按 TOML 默认
  optional bool auto_kafka_protocol = 3;
  // 远端 `-H` 时供 worker Kafka 自动补全 broker 主机；本地 UDS 通常省略
  optional string kafka_broker_host = 4;
}

message RunControlScriptReply {
  // 脚本最终值为 start(...) 返回的 worker id 时填写。
  string worker_id = 1;
  // 脚本中 stat() 等 builtin 的标准输出。
  string output = 2;
  // 执行状态摘要。
  string status = 3;
}

message OpenControlSessionRequest {
  string config_label = 1;
  optional bool auto_kafka_protocol = 2;
  optional string kafka_broker_host = 3;
}
message OpenControlSessionReply { string session_id = 1; }
message EvalControlSessionRequest { string session_id = 1; string source = 2; }
message CloseControlSessionRequest { string session_id = 1; }
message CloseControlSessionReply {}

message StopWorkerRequest {
  string id = 1;
}

message StopWorkerReply {
  string status = 1;
}

message CatWorkerRequest {
  string id = 1;
}

message CatWorkerReply {
  // 与 list 一致，为 config_label
  string config_path = 1;
  // 创建当前 worker 的控制脚本原文
  string script = 2;
}

message HeartbeatRequest {
  string id = 1;
  // 自启动以来累计输出的日志条数（事件数），用于估算 eps
  uint64 log_events_total = 2;
  // 自 worker 启动以来累计发生的 Kafka 重试次数（如 QueueFull、delivery timeout）。
  uint64 retry_total = 3;
}

message HeartbeatReply {}

message StatWorkerRequest {
  string id_prefix = 1;
}

message WorkerStatDetail {
  string id = 1;
  // 展示标签（start 时的 config_label）
  string config_path = 2;
  bool alive = 3;
  bool healthy = 4;
  // 实时估算：外推累计事件数 / 自启动至「当前 stat 时刻」的时长（随 logen stat 刷新，非仅心跳边界）
  double eps = 5;
  uint64 log_events_total = 6;
  double seconds_since_heartbeat = 7;
  uint64 heartbeat_timeout_secs = 8;
  uint64 heartbeat_interval_secs = 9;
  // 上一心跳间隔内的采样速率（仍依赖 worker 心跳粒度）
  double eps_interval = 10;
  // 外推的当前累计事件数（用于对照）
  double log_events_estimated = 11;
  // 自实例 YAML 的 `sink:` 摘要（与嵌套 sink 一致）
  string sink_summary = 12;
  // 自 worker 启动以来累计发生的 Kafka 重试次数（如 QueueFull、delivery timeout）。
  uint64 retry_total = 13;
}

message StatWorkerReply {
  repeated WorkerStatDetail workers = 1;
}
