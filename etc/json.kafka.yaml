# 紧凑单行 JSON 造行 + Kafka sink（供 `logspout start` 使用）。
# 主打压行：固定单行、键名更像业务日志，同时尽量多用 fake 字段生成器。
min-interval: 100
template: >-
  {"event_time":"{{event_time}}","level":"{{level}}","service":"{{service}}","node":"{{node}}","tenant":"{{tenant}}","trace_id":"{{trace_id}}","span_id":"{{span_id}}","request_id":"{{request_id}}","session_id":"{{session_id}}","user_name":"{{user_name}}","operator":"{{operator}}","client_ip":"{{client_ip}}","http_method":"{{http_method}}","request_path":"{{request_path}}","referer":"{{referer}}","user_agent":"{{user_agent}}","status_code":{{status_code}},"ww_id":{{ww_id}},"latency_ms":{{latency_ms}},"edge_pop":"{{edge_pop}}","event_name":"{{event_name}}","message":"{{message}}"}
fields:
  event_time:
    type: timestamp
    format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
  level:
    type: pick
    values: [info, info, info, warn, error]
  service:
    type: pick
    values: [edge-gateway, access-api, logriver, worker]
  node:
    type: hostname
  tenant:
    type: company-name
  trace_id:
    type: uuid-v4
  span_id:
    type: uuid-v4
  request_id:
    type: uuid-v4
  session_id:
    type: uuid-v4
  user_name:
    type: username
  operator:
    type: name-en
  client_ip:
    type: ipv4
  http_method:
    type: pick
    values: [GET, GET, GET, POST, PUT]
  request_path:
    type: url-path
  referer:
    type: url
  user_agent:
    type: user-agent
  status_code:
    type: pick
    values: ["200", "200", "200", "201", "400", "404", "500"]
  ww_id:
    type: counter
  latency_ms:
    type: integer
    min: 2
    max: 900
  edge_pop:
    type: template
    template: "{{city}}-{{zone}}"
    fields:
      city:
        type: lorem-word
      zone:
        type: domain-suffix
  event_name:
    type: template
    template: "{{verb}}-{{target}}"
    fields:
      verb:
        type: lorem-word
      target:
        type: lorem-word
  message:
    type: template
    template: "{{a}}-{{b}}"
    fields:
      a:
        type: lorem-word
      b:
        type: lorem-word
sink:
  type: kafka
  max-size: 0
  kafka:
    brokers:
      - "192.168.1.60:9092"
    topic: logriver
    security.protocol: SSL
    ssl.truststore.location: /opt/yotta/cert/truststore.jks
    ssl.truststore.password:
    ssl.keystore.location: /opt/yotta/cert/keystore.jks
    ssl.keystore.password:
    ssl.endpoint.identification.algorithm: ""
    ssl.protocol: TLSv1.3
    ssl.enabled.protocols: TLSv1.3
