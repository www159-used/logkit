# RFC 5424 syslog 格式（文档: https://www.rfc-editor.org/rfc/rfc5424 ）
# 形状: <prival> VERSION SP TIMESTAMP SP HOSTNAME SP APP-NAME SP PROCID SP MSGID SP STRUCTURED-DATA [SP MSG]
# HOSTNAME / APP-NAME：fake（hostname / lorem-word）；若需 NILVALUE "-" 可改回 pick 混用。
# MSG：sentence；勿用字段名 len、if 等 handlebars 保留字。
#
# 与 rfc5424.sink.yaml 一并（`sink:` 含 `type`；file 时再配 `output`）：logspout start etc/rfc5424.schema.yaml etc/rfc5424.sink.yaml
min-interval: 100
template: >-
  <{{prival}}>1
  {{timestamp}}
  {{hostname}}
  {{app_name}}
  {{procid}}
  {{msgid}}
  {{structured_data}}
  {{msg}}
fields:
  # PRIVAL = facility*8 + severity，合法范围约 0–191；此处在区间内随机
  prival:
    type: integer
    min: 0
    max: 191
  timestamp:
    type: timestamp
    format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
  # fake：{lorem-word}-{lorem-word}.{domain-suffix}
  hostname:
    type: hostname
  # fake：单个 lorem 词（小写），类似短进程名 / 服务标识
  app_name:
    type: lorem-word
  # 数字 PROCID；若要 "-" 可改用 pick
  procid:
    type: integer
    min: 1
    max: 65535
  # fake UUID；若要 "-" / 自定义串可改用 pick
  msgid:
    type: uuid-v4
  # STRUCTURED-DATA：type:one-of 多为 NILVALUE「-」，少数行带动态 SD（仅选中翼求值，counter 不在「-」行递增）
  structured_data:
    type: one-of
    branches:
      - "-"
      - "-"
      - "-"
      - template: >-
          [exampleSDID@32473 iut="{{iut}}" eventSource="{{src}}" eventID="{{eid}}" seq="{{seq}}"]
        fields:
          iut:
            type: integer
            min: 1
            max: 9
          src:
            type: template
            template: "{{p}}-{{q}}"
            fields:
              p:
                type: lorem-word
              q:
                type: lorem-word
          eid:
            type: pick
            values: ["1011", "1012", "2000"]
          seq:
            type: counter
  msg:
    type: sentence
    min: 5
    max: 18
