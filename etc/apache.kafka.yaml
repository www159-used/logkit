# Apache Combined 造行 + 文件 sink（单文件示例，供 `logen start` 使用）。
# 原拆分示例见 apache.schema.yaml / apache.sink.file.yaml，可自行用 yq 等工具合并。
min-interval: 100
template: >-
  {{src_ip}} - {{user}} [{{timestamp}}] "{{method}} {{dst}} HTTP/1.1" {{status}} {{bytes}}
  "{{referer}}" "{{ua}}"
fields:
  src_ip:
    type: ipv4
  user:
    type: one-of
    branches:
      - "-"
      - "-"
      - template: "{{u}}"
        fields:
          u:
            type: username
  timestamp:
    type: timestamp
    format: "%d/%b/%Y:%H:%M:%S %z"
  method:
    type: pick
    values: [GET, GET, GET, POST]
  dst:
    type: url-path
  status:
    type: pick
    values: ["200", "200", "200", "404", "301", "500"]
  bytes:
    type: counter
  referer:
    type: one-of
    branches:
      - "-"
      - "-"
      - "-"
      - template: "https://{{host}}{{path}}"
        fields:
          host:
            type: pick
            values: ["www.example.com", "partner.example.net", "cdn.example.org"]
          path:
            type: url-path
  ua:
    type: user-agent

sink:
  type: kafka
  kafka:
    brokers:
      - 
    topic: logriver
    mode: agent
    agent: 
      source_id: 43983bfc-2db3-47a5-a3a8-d832b2855d51
    security.protocol: SSL
    ssl.truststore.location: /opt/yotta/cert/truststore.jks
    ssl.truststore.password: 
    ssl.keystore.location: /opt/yotta/cert/keystore.jks
    ssl.keystore.password: 
    ssl.endpoint.identification.algorithm: ""
    ssl.protocol: TLSv1.3
    ssl.enabled.protocols: TLSv1.3