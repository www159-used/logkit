# 标准 Apache Combined Log 形状：%h %l %u %t …；%l 固定「-」；%u / Referer 用 type:one-of
# 在「-」与动态子模板间 lazy 多选（仅选中翼求值），更接近真实访问日志。
#
# 与 apache.sink.yaml 一起使用（其中须含 `sink:` 块及 `sink.type`）：
#   logspout start etc/apache.schema.yaml etc/apache.sink.yaml
min-interval: 100
template: >-
  {{src_ip}} - {{user}} [{{timestamp}}] "{{method}} {{dst}} HTTP/1.1" {{status}} {{bytes}}
  "{{referer}}" "{{ua}}"
fields:
  src_ip:
    type: ipv4
  user:
    type: one-of
    branches:
      - "-"
      - "-"
      - template: "{{u}}"
        fields:
          u:
            type: username
  timestamp:
    type: timestamp
    format: "%d/%b/%Y:%H:%M:%S %z"
  method:
    type: pick
    values: [GET, GET, GET, POST]
  dst:
    type: url-path
  status:
    type: pick
    values: ["200", "200", "200", "404", "301", "500"]
  # 勿用字段名 len：`{{len}}` 与 handlebars 内置 helper 冲突
  bytes:
    type: counter
  referer:
    type: one-of
    branches:
      - "-"
      - "-"
      - "-"
      - template: "https://{{host}}{{path}}"
        fields:
          host:
            type: pick
            values: ["www.example.com", "partner.example.net", "cdn.example.org"]
          path:
            type: url-path
  ua:
    type: user-agent
