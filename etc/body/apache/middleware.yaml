# Middleware_Apache（ParserRule id=215）主 grok：%{ApacheAccess1}
# ApacheAccess1 → CommonApache（ApcClientIP ApcIdent ApcUser ApcTimestamp ApcRequest
#   ApcStatus ApcRespLen）+ ApcReferer + ApcUa；无 ApcXForward / GREEDYDATA 尾段。
# 捕获名：clientip/ident/user/timestamp/request/status/resp_len/referer/ua（log_parser NUMBER 等）。
body:
  template: >-
    {{clientip}} {{ident}} {{user}} [{{timestamp}}] {{request}} {{status}} {{resp_len}}
    {{referer}} {{ua}}
  fields:
    clientip:
      type: ipv4
    ident:
      type: one-of
      branches:
        - { w: 1, v: "-" }
        - template: "{{id}}"
          fields:
            id:
              type: username
    user:
      type: one-of
      branches:
        - { w: 2, v: "-" }
        - template: "{{u}}"
          fields:
            u:
              type: username
    timestamp:
      type: timestamp
      format: "%d/%b/%Y:%H:%M:%S %z"
    request:
      type: template
      template: '"{{method}} {{path}} HTTP/{{version}}"'
      fields:
        method:
          type: one-of
          branches:
            - { w: 3, v: GET }
            - { w: 1, v: POST }
            - { w: 1, v: HEAD }
        path:
          type: one-of
          branches:
            - template: "/fig?type={{t}}"
              fields:
                t:
                  type: one-of
                  branches:
                    - v: black
                    - v: white
                    - v: gray
            - template: "{{p}}"
              fields:
                p:
                  type: url-path
        version:
          type: one-of
          branches:
            - v: "1.0"
            - { w: 2, v: "1.1" }
            - v: "2.0"
    status:
      type: one-of
      branches:
        - { w: 3, v: "200" }
        - { w: 1, v: "404" }
        - { w: 1, v: "301" }
        - { w: 1, v: "500" }
    resp_len:
      type: one-of
      branches:
        - { w: 1, v: "-" }
        - template: "{{n}}"
          fields:
            n:
              type: integer
              min: 0
              max: 999999
    referer:
      type: one-of
      branches:
        - { w: 2, v: '"-"' }
        - template: '"{{ref}}"'
          fields:
            ref:
              type: one-of
              branches:
                - { w: 1, v: "-" }
                - template: "https://{{host}}{{rpath}}"
                  fields:
                    host:
                      type: hostname
                    rpath:
                      type: url-path
    ua:
      type: one-of
      branches:
        - { w: 1, v: '"-"' }
        - template: '"{{agent}}"'
          fields:
            agent:
              type: user-agent
