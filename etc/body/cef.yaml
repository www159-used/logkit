# CEF 单行
body:
  template: >-
    CEF:0|Yottabyte|logen|1.0|{{signature_id}}|{{event_name}}|{{severity}}|rt={{rt}} src={{src_ip}} dst={{dst_ip}} spt={{src_port}} dpt={{dst_port}} proto={{proto}} act={{action}} outcome={{outcome}} duser={{user}} externalId={{ww_id}} cs1Label=tenant cs1={{tenant}} cs2Label=trace_id cs2={{trace_id}} msg={{message}}
  fields:
    signature_id:
      type: template
      template: "{{verb}}-{{target}}"
      fields:
        verb:
          type: lorem-word
        target:
          type: lorem-word
    event_name:
      type: template
      template: "{{verb}}-{{target}}"
      fields:
        verb:
          type: lorem-word
        target:
          type: lorem-word
    severity:
      type: integer
      min: 0
      max: 10
    rt:
      type: timestamp
      format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
    src_ip:
      type: ipv4
    dst_ip:
      type: ipv4
    src_port:
      type: integer
      min: 1024
      max: 65535
    dst_port:
      type: one-of
      branches:
        - v: "22"
        - v: "53"
        - v: "80"
        - v: "443"
        - v: "8443"
        - v: "9200"
    proto:
      type: one-of
      branches:
        - { w: 3, v: TCP }
        - { w: 1, v: UDP }
        - { w: 1, v: ICMP }
    action:
      type: one-of
      branches:
        - { w: 3, v: allow }
        - { w: 2, v: deny }
        - { w: 1, v: reset }
    outcome:
      type: one-of
      branches:
        - { w: 3, v: success }
        - { w: 1, v: failure }
    user:
      type: username
    ww_id:
      type: counter
    tenant:
      type: company-name
    trace_id:
      type: uuid-v4
    message:
      type: sentence
      min: 3
      max: 10
