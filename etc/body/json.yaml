# 紧凑单行 JSON（业务日志风格键名）
body:
  template: >-
    {"event_time":"{{event_time}}","level":"{{level}}","service":"{{service}}","node":"{{node}}","tenant":"{{tenant}}","trace_id":"{{trace_id}}","span_id":"{{span_id}}","request_id":"{{request_id}}","session_id":"{{session_id}}","user_name":"{{user_name}}","operator":"{{operator}}","client_ip":"{{client_ip}}","http_method":"{{http_method}}","request_path":"{{request_path}}","referer":"{{referer}}","user_agent":"{{user_agent}}","status_code":{{status_code}},"ww_id":{{ww_id}},"latency_ms":{{latency_ms}},"edge_pop":"{{edge_pop}}","event_name":"{{event_name}}","message":"{{message}}"}
  fields:
    event_time:
      type: timestamp
      format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
    level:
      type: one-of
      branches:
        - { w: 3, v: info }
        - { w: 1, v: warn }
        - { w: 1, v: error }
    service:
      type: one-of
      branches:
        - v: edge-gateway
        - v: access-api
        - v: logriver
        - v: worker
    node:
      type: hostname
    tenant:
      type: company-name
    trace_id:
      type: uuid-v4
    span_id:
      type: uuid-v4
    request_id:
      type: uuid-v4
    session_id:
      type: uuid-v4
    user_name:
      type: username
    operator:
      type: name-en
    client_ip:
      type: ipv4
    http_method:
      type: one-of
      branches:
        - { w: 3, v: GET }
        - { w: 1, v: POST }
        - { w: 1, v: PUT }
    request_path:
      type: url-path
    referer:
      type: url
    user_agent:
      type: user-agent
    status_code:
      type: one-of
      branches:
        - { w: 3, v: "200" }
        - { w: 1, v: "201" }
        - { w: 1, v: "400" }
        - { w: 1, v: "404" }
        - { w: 1, v: "500" }
    ww_id:
      type: counter
    latency_ms:
      type: integer
      min: 2
      max: 900
    edge_pop:
      type: template
      template: "{{city}}-{{zone}}"
      fields:
        city:
          type: lorem-word
        zone:
          type: domain-suffix
    event_name:
      type: template
      template: "{{verb}}-{{target}}"
      fields:
        verb:
          type: lorem-word
        target:
          type: lorem-word
    message:
      type: template
      template: "{{a}}-{{b}}"
      fields:
        a:
          type: lorem-word
        b:
          type: lorem-word
