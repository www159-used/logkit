# LEEF v2 单行（tab 分隔扩展属性）
body:
  template: >-
    LEEF:2.0|Yottabyte|logen|1.0|{{event_id}}|devTime={{dev_time}}	devTimeFormat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX	sev={{severity}}	cat={{category}}	src={{src_ip}}	dst={{dst_ip}}	proto={{proto}}	srcPort={{src_port}}	dstPort={{dst_port}}	usrName={{user}}	action={{action}}	outcome={{outcome}}	ww_id={{ww_id}}	msg={{message}}
  fields:
    event_id:
      type: template
      template: "{{verb}}-{{target}}"
      fields:
        verb:
          type: lorem-word
        target:
          type: lorem-word
    dev_time:
      type: timestamp
      format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
    severity:
      type: integer
      min: 1
      max: 10
    category:
      type: one-of
      branches:
        - v: authentication
        - v: firewall
        - v: vpn
        - v: endpoint
        - v: audit
    src_ip:
      type: ipv4
    dst_ip:
      type: ipv4
    proto:
      type: one-of
      branches:
        - { w: 3, v: TCP }
        - { w: 1, v: UDP }
        - { w: 1, v: ICMP }
    src_port:
      type: integer
      min: 1024
      max: 65535
    dst_port:
      type: one-of
      branches:
        - v: "22"
        - v: "53"
        - v: "80"
        - v: "443"
        - v: "8443"
        - v: "9200"
    user:
      type: username
    action:
      type: one-of
      branches:
        - { w: 3, v: allow }
        - { w: 2, v: deny }
        - { w: 1, v: reset }
    outcome:
      type: one-of
      branches:
        - { w: 3, v: success }
        - { w: 1, v: failure }
    ww_id:
      type: counter
    message:
      type: sentence
      min: 3
      max: 10
