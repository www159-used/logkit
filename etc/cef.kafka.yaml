# CEF 单行造行 + Kafka sink（供 `logspout start` 使用）。
# 走普通 Kafka 文本发送；topic / brokers / TLS 口令按环境自行调整。
min-interval: 100
template: >-
  CEF:0|Yottabyte|logspout|1.0|{{signature_id}}|{{event_name}}|{{severity}}|rt={{rt}} src={{src_ip}} dst={{dst_ip}} spt={{src_port}} dpt={{dst_port}} proto={{proto}} act={{action}} outcome={{outcome}} duser={{user}} externalId={{ww_id}} cs1Label=tenant cs1={{tenant}} cs2Label=trace_id cs2={{trace_id}} msg={{message}}
fields:
  signature_id:
    type: template
    template: "{{verb}}-{{target}}"
    fields:
      verb:
        type: lorem-word
      target:
        type: lorem-word
  event_name:
    type: template
    template: "{{verb}}-{{target}}"
    fields:
      verb:
        type: lorem-word
      target:
        type: lorem-word
  severity:
    type: integer
    min: 0
    max: 10
  rt:
    type: timestamp
    format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
  src_ip:
    type: ipv4
  dst_ip:
    type: ipv4
  src_port:
    type: integer
    min: 1024
    max: 65535
  dst_port:
    type: pick
    values: ["22", "53", "80", "443", "8443", "9200"]
  proto:
    type: pick
    values: [TCP, TCP, TCP, UDP, ICMP]
  action:
    type: pick
    values: [allow, allow, allow, deny, deny, reset]
  outcome:
    type: pick
    values: [success, success, success, failure]
  user:
    type: username
  ww_id:
    type: counter
  tenant:
    type: company-name
  trace_id:
    type: uuid-v4
  message:
    type: sentence
    min: 3
    max: 10

sink:
  type: kafka
  max-size: 0
  kafka:
    brokers:
      - "192.168.1.60:9092"
    topic: logriver
    security.protocol: SSL
    ssl.truststore.location: /opt/yotta/cert/truststore.jks
    ssl.truststore.password:
    ssl.keystore.location: /opt/yotta/cert/keystore.jks
    ssl.keystore.password:
    ssl.endpoint.identification.algorithm: ""
