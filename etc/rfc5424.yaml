# RFC 5424 syslog 格式（文档: https://www.rfc-editor.org/rfc/rfc5424 ）
# 形状: <prival> VERSION SP TIMESTAMP SP HOSTNAME SP APP-NAME SP PROCID SP MSGID SP STRUCTURED-DATA [SP MSG]
# HOSTNAME / APP-NAME：fake（hostname / lorem-word）；若需 NILVALUE "-" 可改回 pick 混用。
# MSG：sentence；勿用字段名 len、if 等 handlebars 保留字。
output: rfc5424-syslog.log
min-interval: 100
template: >-
  <{{prival}}>1
  {{timestamp}}
  {{hostname}}
  {{app_name}}
  {{procid}}
  {{msgid}}
  {{structured_data}}
  {{msg}}
fields:
  # PRIVAL = facility*8 + severity，合法范围约 0–191；此处在区间内随机
  prival:
    type: integer
    min: 0
    max: 191
  timestamp:
    type: timestamp
    format: "%Y-%m-%dT%H:%M:%S%.3f%:z"
  # fake：{lorem-word}-{lorem-word}.{domain-suffix}
  hostname:
    type: hostname
  # fake：单个 lorem 词（小写），类似短进程名 / 服务标识
  app_name:
    type: lorem-word
  # 数字 PROCID；若要 "-" 可改用 pick
  procid:
    type: integer
    min: 1
    max: 65535
  # fake UUID；若要 "-" / 自定义串可改用 pick
  msgid:
    type: uuid-v4
  # NILVALUE "-" 为主；少量带 SD-ID 的 STRUCTURED-DATA（需为合法 sd-element 语法）
  structured_data:
    type: pick
    values:
      - "-"
      - "-"
      - "-"
      - '[exampleSDID@32473 iut="3" eventSource="Application" eventID="1011"]'
      - '[origin ip="192.0.2.10" service="api-gateway"]'
  msg:
    type: sentence
    min: 5
    max: 18
