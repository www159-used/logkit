name: Release builds

# Linux：x86_64 / aarch64 glibc 2.17（Zig 链老 glibc，pullout 可 dlopen）。
# 推送 v* 标签时打包并创建 Forgejo Release（含源码 git archive）。
# macOS 发行包请在 Apple Silicon 本机或自有 runner 上构建。

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-gnu:
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build and package (glibc 2.17)
        run: |
          set -euo pipefail
          for target in x86_64-unknown-linux-gnu.2.17 aarch64-unknown-linux-gnu.2.17; do
            cargo zigbuild --release --target "$target"
            release_dir="$GITHUB_WORKSPACE/target/$target/release"
            if [[ ! -f "$release_dir/logen" ]]; then
              base="${target%.2.*}"
              release_dir="$GITHUB_WORKSPACE/target/$base/release"
            fi
            parent="$GITHUB_WORKSPACE/dist/.stage-$target"
            stage="$parent/logkit"
            rm -rf "$parent"
            mkdir -p "$stage/bin" "$stage/etc" "$stage/tools/bin"
            cp "$release_dir/logen" "$release_dir/logend" "$stage/bin/"
            for tool in kafka-ssl-gen mysql_local pullout jumpserver; do
              if [[ -f "$release_dir/$tool" ]]; then
                cp "$release_dir/$tool" "$stage/tools/bin/"
                chmod +x "$stage/tools/bin/$tool"
              else
                echo "warning: $tool missing for $target" >&2
              fi
            done
            cp -R "$GITHUB_WORKSPACE/etc/." "$stage/etc/"
            cp "$GITHUB_WORKSPACE/bin/install.sh" "$stage/install.sh"
            chmod +x "$stage/install.sh" \
              "$stage/bin/logen" "$stage/bin/logend"
            mkdir -p "$GITHUB_WORKSPACE/dist"
            tar -czf "$GITHUB_WORKSPACE/dist/logkit-${target}.tar.gz" \
              -C "$parent" --owner=0 --group=0 --numeric-owner logkit
            rm -rf "$parent"
          done

      - name: Source archive (git archive)
        if: startsWith(forge.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          git archive --format=tar.gz -o "dist/logkit-${{ forge.ref_name }}-src.tar.gz" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: dist/*.tar.gz

  release:
    if: startsWith(forge.ref, 'refs/tags/')
    needs: [linux-gnu]
    runs-on: codeberg-tiny
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: logkit-dist-linux-gnu
          path: release-assets

      - name: Forgejo Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ forge.token }}
        with:
          files: release-assets/*
          generate_release_notes: true
