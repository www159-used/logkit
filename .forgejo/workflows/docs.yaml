# 构建 guide/ mdbook 并发布到 Codeberg Pages（https://www159.codeberg.page/logkit/）。
# 仓库 Settings → Units → 启用 Actions。

name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-mdbook

      - name: Install mdbook toolchain
        run: |
          cargo install mdbook --version 0.5.3 --locked
          cargo install mdbook-modern-dot --version 0.0.5 --locked

      - name: mdbook build
        run: mdbook build guide

      - uses: https://codeberg.org/git-pages/action@v2
        with:
          site: https://${{ forge.repository_owner }}.codeberg.page/logkit/
          token: ${{ forge.token }}
          source: guide/book/
